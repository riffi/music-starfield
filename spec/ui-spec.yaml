docType: ui-spec
format_version: "0.0.3"

metadata:
  name: music_starfield
  description: "Interactive celestial atlas of music styles and public radio stations. Users explore a projected genre graph, search styles or stations, inspect a selected node, and play live streams with persistent audio controls."
  theme: "celestial atlas interface with premium dark mood, brass highlights, scanline chrome, and glowing constellation accents"
  background: "deep space backdrop with animated starfield and audio-reactive atmosphere"
  palette:
    primary: "aged gold highlights for active controls and framing"
    surface: "near-black translucent panels with blur"
    electronic: "cool blue constellation color"
    rock: "muted crimson constellation color"
    jazz: "violet constellation color"
    classical: "sea-glass constellation color"
    instrumental: "sage constellation color"

screens:
  atlas_explorer:
    title: "Atlas Explorer"
    purpose: "Single-screen exploratory workspace where users pan and zoom the music atlas, expand visible branches, inspect styles, search the catalog, and keep listening while moving through the graph."
    blocks:
      - id: top_header
        columns: 12
        purpose: "Top overlay with product title, atmospheric subtitle, and a search toggle action."

      - id: search_overlay
        columns: 12
        purpose: "Command-palette style search layer opened from the header. Accepts free-text queries for style nodes, stations, or mood descriptors; groups results into Styles and Stations; previews the matched path on hover; and reveals plus selects the destination on click."

      - id: graph_canvas
        columns: 12
        purpose: "Primary SVG atlas with force-positioned nodes and links. Shows only editorially visible branches plus required ancestors, supports pan and zoom, highlights search paths, pulses the currently playing branch, and allows expanding or collapsing sibling-limited branches."

      - id: hover_tooltip
        columns: 12
        purpose: "Pointer-following tooltip for the hovered node with style name, translated level label, matched station count, and context-sensitive interaction hint."

      - id: style_detail_panel
        columns: 12
        purpose: "Right-side inspection panel for the selected node. Displays level label, internal sector code, optional note that the node contains child styles, and all stations that match the node through primary, related, or descriptor ancestry."
        blocks:
          - id: panel_header
            columns: 12
            purpose: "Selected node identity with level badge, node id, human-readable title, and close action."

          - id: hierarchy_note
            columns: 12
            purpose: "Conditional note shown when the selected node has children and can be expanded in the atlas."

          - id: station_cards
            columns: 12
            purpose: "Scrollable stack of station cards. Each card exposes station name, optional editorial description, taxonomy labels for primary, related, and descriptor styles, country, bitrate, and a play or pause button with loading feedback."

          - id: empty_station_state
            columns: 12
            purpose: "Fallback state shown when the selected node currently has no mapped radio transmissions."

      - id: persistent_player
        columns: 12
        purpose: "Bottom docked player that appears only after a station has been selected. Persists while browsing, shows current style context, station name, optional live track metadata, animated waveform or spectrum, transport controls, and gain slider."
        blocks:
          - id: player_context
            columns: 4
            purpose: "Current genre context, station title, and optional now-playing text from supported upstream metadata sources."

          - id: player_visualizer
            columns: 3
            purpose: "Live readout area with animated decorative waveform in idle or loading states and a real analyser-driven spectrum when audio data is available."

          - id: player_transport
            columns: 2
            purpose: "Pause or resume, stop, and sound-settings actions with loading treatment for stream start and resume operations."

          - id: player_gain
            columns: 3
            purpose: "Volume slider with textual gain-state feedback ranging from low to hot."

      - id: sound_settings_modal
        columns: 12
        purpose: "Modal opened from the player for per-session audio shaping. Lets the user enable loudness normalization, tune normalization strength, and adjust fade-in and fade-out durations for station transitions."

      - id: static_overlays
        columns: 12
        purpose: "Persistent decorative and assistive overlays including graph interaction hints and a compass ornament."

interaction_notes:
  - "Search results can target either atlas nodes or stations. Station results resolve to the most relevant atlas context path before opening the side panel."
  - "Expanded branch state, selected node, side-panel visibility, and player sound settings are restored from local persisted app state on load."
  - "The visible atlas is a projection of canonical taxonomy data and includes synthetic cluster nodes such as Club and Breakbeat to improve exploration clarity."
  - "The player may fetch live metadata from supported providers such as SomaFM and Soundpark Deep while a station is active."

detailing_philosophy:
  core_principle: "Favor reusable product structure and observed interaction rules over low-level implementation detail."
  level_guidance:
    implementation_handoff:
      intent: "Enough precision for another agent to rebuild the single-screen flow, projected graph behavior, search UX, and audio-control model from the spec alone."
