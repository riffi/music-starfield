<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Starfield</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#d4a853;--gold-dim:rgba(212,168,83,0.3);--gold-glow:rgba(212,168,83,0.15);
  --text:#e8dfc0;--text-dim:#a09070;--text-faint:rgba(160,144,112,0.5);
  --panel-bg:rgba(6,10,26,0.97);--border:rgba(212,168,83,0.25);
  --relax:#d4a853;--electronic:#5a90d4;--rock:#c94848;--jazz:#9c5ad4;
}
body{background:#03060f;color:var(--text);font-family:'EB Garamond',Georgia,serif;height:100vh;width:100vw;overflow:hidden;user-select:none}
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#graph-svg{position:fixed;top:0;left:0;width:100%;height:calc(100vh - 88px);z-index:1;cursor:grab}
#graph-svg:active{cursor:grabbing}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:flex-start;justify-content:space-between;padding:16px 24px;pointer-events:none}
.hdr-center{text-align:center;flex:1}
.hdr-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:.25em;color:var(--gold);text-shadow:0 0 30px rgba(212,168,83,.4);text-transform:uppercase}
.hdr-sub{font-family:'EB Garamond',serif;font-style:italic;font-size:12px;color:var(--text-dim);margin-top:2px;letter-spacing:.05em}
.legend{display:flex;gap:14px;align-items:center;padding-top:4px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-family:'Cinzel',serif;letter-spacing:.05em}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* ── INSTRUCTIONS ── */
#hints{position:fixed;bottom:100px;left:22px;z-index:10;pointer-events:none;font-size:11px;color:var(--text-faint);line-height:2;font-family:'Cinzel',serif;letter-spacing:.04em}

/* ── STATION PANEL ── */
#panel{position:fixed;right:0;top:0;width:310px;height:calc(100vh - 88px);background:var(--panel-bg);border-left:1px solid var(--border);z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(12px)}
#panel.open{transform:translateX(0)}
#panel-hdr{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
#panel-hdr::before{content:'✦ ✦ ✦';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%) translateY(50%);background:var(--panel-bg);padding:0 8px;font-size:9px;color:var(--border);letter-spacing:.3em}
#p-level{font-size:9px;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;font-family:'Cinzel',serif}
#p-name{font-family:'Cinzel',serif;font-size:22px;font-weight:600;color:var(--gold);margin-top:4px;text-shadow:0 0 20px rgba(212,168,83,.3)}
#p-close{position:absolute;top:14px;right:14px;background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;width:26px;height:26px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:sans-serif}
#p-close:hover{color:var(--gold);border-color:var(--gold);text-shadow:0 0 8px rgba(212,168,83,.4)}
#p-body{flex:1;overflow-y:auto;padding:18px}
#p-body::-webkit-scrollbar{width:3px}
#p-body::-webkit-scrollbar-track{background:transparent}
#p-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.s-card{background:rgba(212,168,83,.04);border:1px solid rgba(212,168,83,.12);border-radius:6px;padding:13px;margin-bottom:11px;position:relative;transition:all .2s}
.s-card:hover{border-color:rgba(212,168,83,.35);background:rgba(212,168,83,.07)}
.s-card.playing{border-color:var(--gold);background:rgba(212,168,83,.1);box-shadow:0 0 18px rgba(212,168,83,.12)}
.s-name{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;padding-right:42px;line-height:1.3}
.s-meta{display:flex;gap:8px;align-items:center}
.s-country{font-size:12px;color:var(--text-dim)}
.s-br{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.2);padding:1px 6px;border-radius:3px;font-size:9px;font-family:'Cinzel',serif;letter-spacing:.05em;color:var(--gold)}
.pbtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(212,168,83,.08);border:1px solid rgba(212,168,83,.25);color:var(--gold);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pbtn:hover{background:rgba(212,168,83,.2);border-color:var(--gold)}
.pbtn.on{background:var(--gold);color:#03060f;box-shadow:0 0 14px rgba(212,168,83,.45)}
.empty{color:var(--text-dim);font-style:italic;font-size:13px;text-align:center;padding:28px 0}

/* ── MINI PLAYER ── */
#player{position:fixed;bottom:0;left:0;right:0;height:88px;z-index:30;background:rgba(3,5,14,.97);border-top:1px solid var(--border);backdrop-filter:blur(14px);display:flex;align-items:center;gap:16px;padding:0 22px}
.pl-orrery{width:46px;height:46px;flex-shrink:0;position:relative}
.pl-orrery svg{width:100%;height:100%}
.pl-info{flex:1;min-width:0}
#pl-genre{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.15em;font-family:'Cinzel',serif}
#pl-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.pl-idle{color:var(--text-dim);font-style:italic;font-size:13px;font-family:'EB Garamond',serif;font-weight:400}
.pl-bars{display:flex;align-items:flex-end;gap:2px;height:18px;flex-shrink:0;margin:0 4px}
.bar{width:3px;background:var(--gold);border-radius:2px;opacity:0;transition:opacity .3s}
.bar.on{opacity:1}
.bar:nth-child(1){animation:b 0.7s ease-in-out infinite alternate;height:40%}
.bar:nth-child(2){animation:b 0.9s ease-in-out infinite alternate .1s;height:70%}
.bar:nth-child(3){animation:b 0.6s ease-in-out infinite alternate .2s;height:100%}
.bar:nth-child(4){animation:b 0.8s ease-in-out infinite alternate .1s;height:60%}
.bar:nth-child(5){animation:b 0.7s ease-in-out infinite alternate 0s;height:35%}
@keyframes b{from{transform:scaleY(.5)}to{transform:scaleY(1)}}
.pl-ctrls{display:flex;gap:10px;flex-shrink:0}
.cbtn{width:34px;height:34px;border-radius:50%;background:rgba(212,168,83,.05);border:1px solid rgba(212,168,83,.18);color:var(--gold);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cbtn:hover{background:rgba(212,168,83,.15);border-color:var(--gold)}
.cbtn.on{background:var(--gold);color:#03060f;box-shadow:0 0 14px rgba(212,168,83,.35)}
.vol-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0}
.vol-ico{color:var(--text-dim);font-size:12px;font-family:'Cinzel',serif}
input[type=range]{-webkit-appearance:none;width:78px;height:3px;background:rgba(212,168,83,.18);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--gold);border-radius:50%;box-shadow:0 0 6px rgba(212,168,83,.35)}

/* ── TOOLTIP ── */
#tip{position:fixed;pointer-events:none;z-index:50;background:rgba(3,5,18,.96);border:1px solid var(--border);padding:9px 13px;border-radius:4px;backdrop-filter:blur(8px);opacity:0;transition:opacity .15s;max-width:180px}
#tip.show{opacity:1}
#tt-name{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--gold)}
#tt-lv{font-size:10px;color:var(--text-dim);margin-top:3px}
#tt-st{font-size:10px;color:var(--text-dim);margin-top:1px}
#tt-hint{font-size:9px;color:var(--text-faint);margin-top:5px;font-style:italic}

/* ── COMPASS ROSE ── */
#compass{position:fixed;bottom:104px;right:22px;z-index:10;opacity:.18;pointer-events:none}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="hdr">
  <div class="hdr-center">
    <div class="hdr-title">✦ Music Starfield ✦</div>

  </div>

    <div class="legend-item"><div class="legend-dot" style="background:var(--electronic);box-shadow:0 0 6px var(--electronic)"></div><span style="color:var(--text-dim)">Electronic</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--rock);box-shadow:0 0 6px var(--rock)"></div><span style="color:var(--text-dim)">Rock</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--jazz);box-shadow:0 0 6px var(--jazz)"></div><span style="color:var(--text-dim)">Jazz</span></div>
  </div>
</div>

<svg id="graph-svg"></svg>

<div id="panel">
  <div id="panel-hdr">
    <div id="p-level">Constellation</div>

<div id="tip">

  <div id="tt-lv"></div>
  <div id="tt-st"></div>
  <div id="tt-hint"></div>
</div>

<div id="player">
  <div class="pl-orrery">
    <svg viewBox="0 0 46 46" xmlns="http://www.w3.org/2000/svg" id="orrery-svg">
      <circle cx="23" cy="23" r="20" fill="none" stroke="rgba(212,168,83,0.12)" stroke-width="0.8"/>
      <circle cx="23" cy="23" r="13" fill="none" stroke="rgba(212,168,83,0.18)" stroke-width="0.8"/>
      <line x1="23" y1="3" x2="23" y2="43" stroke="rgba(212,168,83,0.1)" stroke-width="0.5"/>
      <line x1="3" y1="23" x2="43" y2="23" stroke="rgba(212,168,83,0.1)" stroke-width="0.5"/>
      <line x1="8.4" y1="8.4" x2="37.6" y2="37.6" stroke="rgba(212,168,83,0.07)" stroke-width="0.5"/>
      <line x1="37.6" y1="8.4" x2="8.4" y2="37.6" stroke="rgba(212,168,83,0.07)" stroke-width="0.5"/>
      <circle cx="23" cy="23" r="4" fill="rgba(212,168,83,0.15)" stroke="rgba(212,168,83,0.5)" stroke-width="0.8" id="orrery-star"/>
    </svg>
  </div>
  <div class="pl-info">
    <div id="pl-genre"></div>
    <div id="pl-name"><span class="pl-idle">Select a star to begin transmission…</span></div>
  </div>
  <div class="pl-bars" id="pl-bars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="pl-ctrls">
    <button class="cbtn" id="cb-pause" title="Pause / Resume">⏸</button>
    <button class="cbtn" id="cb-stop" title="Stop">⏹</button>
  </div>
  <div class="vol-wrap">
    <span class="vol-ico">♪</span>
    <input type="range" id="vol" min="0" max="100" value="75">
  </div>
</div>

<div id="hints">
  <div>✦ Click a constellation to reveal stars</div>
  <div>✦ Click again to collapse</div>
  <div>✦ Click any star for radio stations</div>
  <div>✦ Drag &amp; scroll to navigate</div>
</div>

<svg id="compass" width="60" height="60" viewBox="0 0 60 60">
  <circle cx="30" cy="30" r="28" fill="none" stroke="rgba(212,168,83,0.8)" stroke-width="0.7"/>
  <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(212,168,83,0.5)" stroke-width="0.5" stroke-dasharray="2 4"/>

<script>
// ─── STAR FIELD ────────────────────────────────────────────────────────────
(function(){
  const cv=document.getElementById('starfield'),ctx=cv.getContext('2d');
  let W,H,stars=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
  function init(){
    stars=[];
    for(let i=0;i<320;i++)stars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.3+0.15,
      op:Math.random()*.65+.1,
      spd:Math.random()*.008+.002,
      ph:Math.random()*Math.PI*2,
      col:Math.random()>.85?'212,168,83':Math.random()>.6?'170,185,255':'220,225,255'
    });
  }
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.5,Math.max(W,H)*.65);
    g.addColorStop(0,'rgba(9,14,34,1)');g.addColorStop(1,'rgba(2,4,12,1)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    t+=.008;
    for(const s of stars){
      const tw=Math.sin(t*s.spd*12+s.ph)*.5+.5;
      const op=s.op*(.35+.65*tw);
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${s.col},${op})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init();});
  resize();init();draw();
})();

  {id:'darkambient',name:'Dark Ambient',level:3,parent:'ambient',stations:[

  ]},
  {id:'spaceambient',name:'Space Ambient',level:3,parent:'ambient',stations:[
    {name:'SomaFM: Deep Space One',url:'https://ice1.somafm.com/deepspaceone-128-aac',country:'🇺🇸 US',bitrate:'128k'},
    {name:'SomaFM: Space Station',url:'https://ice1.somafm.com/spacestation-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},

  // L3 – House
  {id:'deephouse',name:'Deep House',level:3,parent:'house',stations:[
    {name:'DI.FM: Deep House',url:'https://pub7.di.fm/di_deephouse',country:'🇺🇸 US',bitrate:'128k'},
  ]},
  {id:'proghouse',name:'Progressive House',level:3,parent:'house',stations:[
    {name:'DI.FM: Progressive House',url:'https://pub7.di.fm/di_progressivehouse',country:'🇺🇸 US',bitrate:'128k'},
  ]},

  // L3 – Techno
  {id:'industrialtech',name:'Industrial Techno',level:3,parent:'techno',stations:[
    {name:'DI.FM: Techno',url:'https://pub7.di.fm/di_techno',country:'🇺🇸 US',bitrate:'128k'},
  ]},
  {id:'minimaltech',name:'Minimal Techno',level:3,parent:'techno',stations:[
    {name:'DI.FM: Minimal',url:'https://pub7.di.fm/di_minimal',country:'🇺🇸 US',bitrate:'128k'},
  ]},

  // L3 – Indie Rock
  {id:'shoegaze',name:'Shoegaze',level:3,parent:'indierock',stations:[
    {name:'SomaFM: Drone Zone',url:'https://ice1.somafm.com/dronezone-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},
  {id:'dreampop',name:'Dream Pop',level:3,parent:'indierock',stations:[
    {name:'SomaFM: Lush',url:'https://ice1.somafm.com/lush-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},

  // L3 – Smooth Jazz
  {id:'contemjazz',name:'Contemporary Jazz',level:3,parent:'smoothjazz',stations:[
    {name:'SomaFM: Sonic Universe',url:'https://ice1.somafm.com/sonicuniverse-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},
  {id:'cafejazz',name:'Café Jazz',level:3,parent:'smoothjazz',stations:[
    {name:'SomaFM: Secret Agent',url:'https://ice1.somafm.com/secretagent-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},

  // L3 – Nu Jazz
  {id:'acidjazz',name:'Acid Jazz',level:3,parent:'nujazz',stations:[
    {name:'SomaFM: Illinois St. Lounge',url:'https://ice1.somafm.com/illstreet-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},
  {id:'neosouljazz',name:'Neo Soul Jazz',level:3,parent:'nujazz',stations:[
    {name:'SomaFM: Sonic Universe',url:'https://ice1.somafm.com/sonicuniverse-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},

  // L3 – Trip-Hop
  {id:'downtempo',name:'Downtempo',level:3,parent:'triphop',stations:[
    {name:'SomaFM: Groove Salad',url:'https://ice1.somafm.com/groovesalad-128-aac',country:'🇺🇸 US',bitrate:'128k'},
    {name:'DI.FM: Chillout',url:'https://pub7.di.fm/di_chillout',country:'🇺🇸 US',bitrate:'128k'},
  ]},
  {id:'bristolsound',name:'Bristol Sound',level:3,parent:'triphop',stations:[
    {name:'SomaFM: Illinois St. Lounge',url:'https://ice1.somafm.com/illstreet-128-aac',country:'🇺🇸 US',bitrate:'128k'},
  ]},
];

const NM={};
NODES.forEach(n=>{NM[n.id]=n;});

// Build all links
const LINKS=[];
NODES.forEach(n=>{if(n.parent)LINKS.push({source:n.parent,target:n.id});});

// ─── D3 SETUP ───────────────────────────────────────────────────────────────
const svg=d3.select('#graph-svg');
const W=()=>svg.node().clientWidth;
const H=()=>svg.node().clientHeight;

const defs=svg.append('defs');
// Glow filters
['glow3','glow6','glow10'].forEach((id,i)=>{
  const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',[3,6,10][i]).attr('result','blur');
  const m=f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

const g=svg.append('g');
const zoomBeh=d3.zoom().scaleExtent([.2,3.5]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoomBeh);
svg.on('click.bg',()=>{closePanel();deselect();});

const linkG=g.append('g');
const nodeG=g.append('g');
const labelG=g.append('g');

// ─── STATE ──────────────────────────────────────────────────────────────────
const expanded=new Set();
let selNode=null;
let audio=null;
let curSid=null;

function nr(d){return d.level===1?27:d.level===2?16:9;}

// ─── VISIBLE NODES/LINKS ────────────────────────────────────────────────────
function getVis(){
  const nodes=NODES.filter(n=>{
    if(n.level===1)return true;
    if(n.level===2)return expanded.has(n.parent);
    if(n.level===3){const p=NM[n.parent];return p&&expanded.has(p.parent)&&expanded.has(n.parent);}
    return false;
  });
  const ids=new Set(nodes.map(n=>n.id));
  const links=LINKS.filter(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return ids.has(s)&&ids.has(t);
  });
  return{nodes,links};
}

// ─── SIMULATION ─────────────────────────────────────────────────────────────
const sim=d3.forceSimulation()
  .force('link',d3.forceLink().id(d=>d.id).distance(d=>{
    const sl=(typeof d.source==='object'?d.source:NM[d.source]||{}).level||1;
    return sl===1?130:sl===2?85:60;
  }).strength(0.7))
  .force('charge',d3.forceManyBody().strength(d=>d.level===1?-350:d.level===2?-160:-80))
  .force('collision',d3.forceCollide().radius(d=>nr(d)+22))
  .force('center',d3.forceCenter())
  .on('tick',tick);

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update(initial){
  const{nodes,links}=getVis();
  sim.force('center',d3.forceCenter(W()/2,H()/2));

  // Init positions for new nodes
  nodes.forEach(n=>{
    if(n.x===undefined){
      const p=n.parent?NM[n.parent]:null;
      n.x=p&&p.x!==undefined?p.x+(Math.random()-.5)*50:W()/2+(Math.random()-.5)*180;
      n.y=p&&p.y!==undefined?p.y+(Math.random()-.5)*50:H()/2+(Math.random()-.5)*180;
    }
  });

  // LINKS
  const lk=linkG.selectAll('line.edge').data(links,d=>{
    const s=typeof d.source==='object'?d.source.id:d.source;
    const t=typeof d.target==='object'?d.target.id:d.target;
    return s+'>'+t;
  });
  lk.enter().append('line').attr('class','edge')
    .style('stroke',d=>{const t=typeof d.target==='object'?d.target.id:d.target;return nodeColor(NM[t]);})
    .style('stroke-opacity',.22)
    .style('stroke-width',d=>{const s=typeof d.source==='object'?d.source.id:d.source;return (NM[s]||{}).level===1?1.4:0.9;})
    .style('stroke-dasharray',d=>{const s=typeof d.source==='object'?d.source.id:d.source;return (NM[s]||{}).level===1?'5,5':'2,5';})
    .style('opacity',0).transition().duration(450).style('opacity',1);
  lk.exit().transition().duration(300).style('opacity',0).remove();

  // NODES
  const nk=nodeG.selectAll('g.nd').data(nodes,d=>d.id);

  const ne=nk.enter().append('g').attr('class','nd')
    .attr('transform',d=>{
      const p=d.parent?NM[d.parent]:null;
      const px=p&&p.x!==undefined?p.x:W()/2,py=p&&p.y!==undefined?p.y:H()/2;
      return `translate(${px+(Math.random()-.5)*30},${py+(Math.random()-.5)*30})`;
    })
    .style('opacity',0).style('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{e.sourceEvent.stopPropagation();if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;})
    )
    .on('click',(e,d)=>{e.stopPropagation();clickNode(d);})
    .on('mouseover',(e,d)=>showTip(e,d))
    .on('mousemove',e=>{document.getElementById('tip').style.left=(e.clientX+14)+'px';document.getElementById('tip').style.top=(e.clientY-10)+'px';})
    .on('mouseout',()=>document.getElementById('tip').classList.remove('show'));

  // Outer glow ring
  ne.append('circle').attr('class','gring')
    .attr('r',d=>nr(d)*1.9).attr('fill','none')
    .attr('stroke',d=>nodeColor(d)).attr('stroke-width',.5).attr('stroke-opacity',.2)
    .attr('filter',d=>d.level===1?'url(#glow10)':d.level===2?'url(#glow6)':'url(#glow3)');

  // Second ring for L1
  ne.filter(d=>d.level===1).append('circle')
    .attr('r',d=>nr(d)*1.35).attr('fill','none')
    .attr('stroke',d=>nodeColor(d)).attr('stroke-width',.6).attr('stroke-opacity',.4)
    .attr('filter','url(#glow6)');

  // Body
  ne.append('circle').attr('class','nbody')
    .attr('r',d=>nr(d))
    .attr('fill',d=>nodeColor(d)+'20')
    .attr('stroke',d=>nodeColor(d))
    .attr('stroke-width',d=>d.level===1?2:1.5)
    .attr('filter',d=>d.level===1?'url(#glow6)':'url(#glow3)');

  // Core
  ne.filter(d=>d.level<=2).append('circle').attr('class','ncore')
    .attr('r',d=>nr(d)*.38)
    .attr('fill',d=>nodeColor(d))
    .attr('filter','url(#glow3)');

  // Cross for L1 (star shape)
  ne.filter(d=>d.level===1).each(function(d){
    const gg=d3.select(this),s=nr(d)*.75;
    gg.append('line').attr('x1',-s).attr('y1',0).attr('x2',s).attr('y2',0)
      .attr('stroke',nodeColor(d)).attr('stroke-width',.8).attr('stroke-opacity',.55);
    gg.append('line').attr('x1',0).attr('y1',-s).attr('x2',0).attr('y2',s)
      .attr('stroke',nodeColor(d)).attr('stroke-width',.8).attr('stroke-opacity',.55);
    gg.append('line').attr('x1',-s*.65).attr('y1',-s*.65).attr('x2',s*.65).attr('y2',s*.65)
      .attr('stroke',nodeColor(d)).attr('stroke-width',.5).attr('stroke-opacity',.3);
    gg.append('line').attr('x1',s*.65).attr('y1',-s*.65).attr('x2',-s*.65).attr('y2',s*.65)
      .attr('stroke',nodeColor(d)).attr('stroke-width',.5).attr('stroke-opacity',.3);
  });

  ne.transition().duration(500).style('opacity',1);

  // LABELS
  const lbl=labelG.selectAll('text.lbl').data(nodes,d=>d.id);
  lbl.enter().append('text').attr('class','lbl')
    .style('font-family',"'Cinzel',serif")
    .style('font-size',d=>d.level===1?'13px':d.level===2?'10px':'9px')
    .style('font-weight',d=>d.level===1?'600':'400')
    .style('fill',d=>d.level===1?nodeColor(d):'#b8a888')
    .style('text-anchor','middle')
    .style('pointer-events','none')
    .style('letter-spacing',d=>d.level===1?'.1em':'.04em')
    .attr('dy',d=>nr(d)+(d.level===1?20:d.level===2?14:12))
    .text(d=>d.name)
    .style('opacity',0).transition().duration(500).style('opacity',1);
  lbl.exit().transition().duration(300).style('opacity',0).remove();

  nk.exit().transition().duration(300).style('opacity',0).remove();

  sim.nodes(nodes);
  sim.force('link').links(links);
  sim.alpha(initial?1:.4).restart();
}

function tick(){
  linkG.selectAll('line.edge')
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.selectAll('g.nd').attr('transform',d=>`translate(${d.x},${d.y})`);
  labelG.selectAll('text.lbl').attr('x',d=>d.x).attr('y',d=>d.y);
  nodeG.selectAll('g.nd').each(function(d){if(NM[d.id]){NM[d.id].x=d.x;NM[d.id].y=d.y;}});
}

// ─── CLICK ───────────────────────────────────────────────────────────────────
function collapseAll(id){
  expanded.delete(id);
  NODES.filter(n=>n.parent===id).forEach(n=>collapseAll(n.id));
}

function clickNode(d){
  const hasKids=NODES.some(n=>n.parent===d.id);
  if(hasKids){
    if(expanded.has(d.id))collapseAll(d.id);
    else expanded.add(d.id);
    update(false);
  }
  selNode=d.id;
  highlight(d.id);
  showPanel(d);
}

function deselect(){
  selNode=null;
  nodeG.selectAll('g.nd').select('.nbody')
    .attr('stroke-width',d=>d.level===1?2:1.5)
    .attr('fill',d=>nodeColor(d)+'20');
}

function highlight(id){
  nodeG.selectAll('g.nd').select('.nbody')
    .attr('stroke-width',d=>d.id===id?(d.level===1?3:2.5):(d.level===1?2:1.5))
    .attr('fill',d=>d.id===id?nodeColor(d)+'44':nodeColor(d)+'20');
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
function showTip(e,d){
  const lvl=['','Major Constellation','Star System','Stellar Body'];
  document.getElementById('tt-name').textContent=d.name;
  document.getElementById('tt-lv').textContent=lvl[d.level];
  document.getElementById('tt-st').textContent=d.stations.length+' radio transmission'+(d.stations.length!==1?'s':'');
  const kids=NODES.some(n=>n.parent===d.id);
  document.getElementById('tt-hint').textContent=kids?(expanded.has(d.id)?'↙ Click to collapse':'↗ Click to expand'):'● Click for stations';
  const tip=document.getElementById('tip');
  tip.classList.add('show');
  tip.style.left=(e.clientX+14)+'px';
  tip.style.top=(e.clientY-10)+'px';
}

// ─── PANEL ───────────────────────────────────────────────────────────────────
function showPanel(d){
  const lvl=['','Major Constellation','Star System','Stellar Body'];
  document.getElementById('p-level').textContent=lvl[d.level];
  document.getElementById('p-name').textContent=d.name;
  const body=document.getElementById('p-body');
  body.innerHTML='';

  if(!d.stations||!d.stations.length){
    body.innerHTML='<div class="empty">No transmissions charted.</div>';
  } else {
    // Add children count info if has kids
    const kids=NODES.filter(n=>n.parent===d.id);
    if(kids.length){
      const info=document.createElement('div');
      info.style.cssText='font-size:11px;color:var(--text-dim);font-style:italic;margin-bottom:14px;padding:8px 10px;border:1px solid var(--border);border-radius:4px;line-height:1.5';
      info.innerHTML=`<span style="color:var(--gold)">✦</span> Contains ${kids.length} sub-genre${kids.length!==1?'s':''}. Click the star to expand.`;
      body.appendChild(info);
    }

    // Divider
    const div=document.createElement('div');
    div.style.cssText='font-family:Cinzel,serif;font-size:9px;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;text-align:center';
    div.textContent='Radio Transmissions';
    body.appendChild(div);

    d.stations.forEach((s,i)=>{
      const sid=`${d.id}-${i}`;
      const card=document.createElement('div');
      card.className='s-card'+(sid===curSid?' playing':'');
      card.innerHTML=`
        <div class="s-name">${s.name}</div>
        <div class="s-meta"><span class="s-country">${s.country}</span><span class="s-br">${s.bitrate}</span></div>
        <button class="pbtn${sid===curSid?' on':''}" data-sid="${sid}" data-url="${s.url}" data-name="${s.name}" data-genre="${d.name}">${sid===curSid?'⏸':'▶'}</button>
      `;
      body.appendChild(card);
    });
    body.querySelectorAll('.pbtn').forEach(btn=>{
      btn.addEventListener('click',e=>{e.stopPropagation();playStation(btn.dataset.sid,btn.dataset.url,btn.dataset.name,btn.dataset.genre);});
    });
  }
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  deselect();
}
document.getElementById('p-close').addEventListener('click',closePanel);

// ─── AUDIO ───────────────────────────────────────────────────────────────────
function playStation(sid,url,name,genre){
  if(sid===curSid){
    if(audio.paused){audio.play();setPulse(true);}
    else{audio.pause();setPulse(false);}
    refreshBtns();return;
  }
  stopAudio();
  curSid=sid;
  audio=new Audio(url);
  audio.volume=document.getElementById('vol').value/100;
  audio.play().catch(()=>{});
  document.getElementById('pl-genre').textContent=genre;
  document.getElementById('pl-name').innerHTML=`<span>${name}</span>`;
  setPulse(true);
  document.getElementById('cb-pause').textContent='⏸';
  document.getElementById('cb-pause').classList.add('on');
  refreshBtns();
}

function stopAudio(){
  if(audio){audio.pause();audio.src='';audio=null;}
  curSid=null;setPulse(false);
  document.getElementById('pl-genre').textContent='';
  document.getElementById('pl-name').innerHTML='<span class="pl-idle">Select a star to begin transmission…</span>';
  document.getElementById('cb-pause').textContent='⏸';
  document.getElementById('cb-pause').classList.remove('on');
  refreshBtns();
}

function refreshBtns(){
  document.querySelectorAll('.pbtn').forEach(btn=>{
    const on=btn.dataset.sid===curSid;
    btn.classList.toggle('on',on);
    btn.textContent=on?'⏸':'▶';
    btn.closest('.s-card').classList.toggle('playing',on);
  });
}
function setPulse(on){document.querySelectorAll('.bar').forEach(b=>b.classList.toggle('on',on));}

document.getElementById('cb-pause').addEventListener('click',()=>{
  if(!audio)return;
  if(audio.paused){audio.play();setPulse(true);document.getElementById('cb-pause').textContent='⏸';document.getElementById('cb-pause').classList.add('on');}
  else{audio.pause();setPulse(false);document.getElementById('cb-pause').textContent='▶';document.getElementById('cb-pause').classList.remove('on');}
  refreshBtns();
});
document.getElementById('cb-stop').addEventListener('click',stopAudio);
document.getElementById('vol').addEventListener('input',e=>{if(audio)audio.volume=e.target.value/100;});

// ─── ORRERY ANIMATION ────────────────────────────────────────────────────────
(function orrery(){
  const star=document.getElementById('orrery-star');
  let a=0;
  function frame(){
    a+=.015;
    const x=23+Math.cos(a)*9,y=23+Math.sin(a)*9;
    star.setAttribute('cx',x);star.setAttribute('cy',y);
    requestAnimationFrame(frame);
  }
  frame();
})();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  sim.force('center',d3.forceCenter(W()/2,H()/2));
  sim.alpha(.1).restart();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
update(true);

// Center view after brief delay
setTimeout(()=>{
  svg.call(zoomBeh.transform,d3.zoomIdentity.translate(W()/2,H()/2).scale(1).translate(-W()/2,-H()/2));
},100);
</script>
